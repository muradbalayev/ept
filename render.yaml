services:
  - type: web
    name: maglev-digital-twin-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: CORS_ORIGINS
        value: https://maglev-moisture-twin.vercel.app
